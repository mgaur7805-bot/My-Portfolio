<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG | Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #050608;
            --card-bg: linear-gradient(145deg, #0f111a, #0b0c10);
            --text-main: #ffffff;
            --text-sub: #aeb6bf;
            --text-muted: #626a73;
            --neon-accent: #ff4a4a;
            --neon-glow: rgba(255, 74, 74, 0.4);
            --header-bg: rgba(11, 12, 16, 0.7);
            --border-color: rgba(255, 255, 255, 0.05);
            --track-bg: #0f1219;
            --input-bg: #141822;
            --success-green: #00ca6d;
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background: var(--bg-color); color: var(--text-sub); overflow-x: hidden; padding-bottom: 50px; }
        h1, h2, h3 { font-family: 'Syne', sans-serif; font-weight: 800; text-transform: uppercase; color: var(--text-main); }

        header { background: var(--header-bg); backdrop-filter: blur(20px); padding: 20px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top:0; z-index:100; }
        .logo { font-size: 24px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .logo span { color: var(--neon-accent); text-shadow: 0 0 10px var(--neon-glow); }

        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        .panel-card { background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin-bottom: 40px; }
        .panel-card h2 { font-size: 22px; margin-bottom: 20px; letter-spacing: -0.5px; border-left: 4px solid var(--neon-accent); padding-left: 12px; }

        .form-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .form-grid { grid-template-columns: repeat(2, 1fr); } }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
        select, input { background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 14px 18px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; width: 100%; }
        select:focus, input:focus { border-color: var(--neon-accent); box-shadow: 0 0 15px rgba(255, 74, 74, 0.2); }

        .submit-btn { background: var(--neon-accent); color: #fff; border: none; padding: 16px; font-size: 13px; font-weight: 700; letter-spacing: 2px; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 20px rgba(255, 74, 74, 0.3); width: 100%; margin-top: 20px; }
        .submit-btn:hover { background: #fff; color: #000; box-shadow: 0 0 25px rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        .track-list { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .track-item { background: var(--track-bg); border-radius: 10px; padding: 15px 20px; border: 1px solid rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .track-item:hover { border-color: rgba(255, 255, 255, 0.08); }
        .track-info { display: flex; flex-direction: column; gap: 4px; }
        .track-title { font-weight: 700; color: #fff; font-size: 15px; }
        .track-meta { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .delete-btn { background: rgba(255, 74, 74, 0.1); color: var(--neon-accent); border: 1px solid rgba(255, 74, 74, 0.2); padding: 8px 16px; font-size: 11px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .delete-btn:hover { background: var(--neon-accent); color: #fff; }

        .toast { position: fixed; bottom: 30px; right: 30px; background: var(--success-green); color: #fff; padding: 15px 25px; border-radius: 8px; font-weight: 700; font-size: 13px; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(0, 202, 109, 0.3); transform: translateY(100px); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; text-transform: uppercase; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <header>
        <div class="logo">MG <span>Admin Panel</span></div>
    </header>

    <div class="container">
        <div class="panel-card">
            <h2>Timeline Add Sequence</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Select Workspace Track</label>
                    <select id="track-select">
                        <option value="pr">🎬 Premiere Pro Workspace</option>
                        <option value="ae">⚡ After Effects Workspace</option>
                        <option value="dv">🎨 DaVinci Resolve Workspace</option>
                        <option value="il">📐 Illustrator Studio</option>
                        <option value="cr">✒️ CorelDraw Workspace</option>
                        <option value="an">👾 Adobe Animation Suite</option>
                        <option value="fg">❖ Figma Interface Labs</option>
                        <option value="story">🚀 Digital Storytelling Hub</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Project Name</label>
                    <input type="text" id="project-name" placeholder="Enter Project title...">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Media Link (Instagram Reels / YouTube Shorts / Videos)</label>
                    <input type="text" id="media-link" placeholder="Paste full link here...">
                </div>
            </div>
            <button class="submit-btn" onclick="saveProjectSequence()">Push to Active Workspace</button>
        </div>

        <div class="panel-card">
            <h2>Current Active Timelines</h2>
            <div class="form-group" style="margin-bottom: 25px;">
                <label>Filter workspace</label>
                <select id="filter-select" onchange="fetchCurrentSequence()">
                    <option value="pr">🎬 Premiere Pro Workspace</option>
                    <option value="ae">⚡ After Effects Workspace</option>
                    <option value="dv">🎨 DaVinci Resolve Workspace</option>
                    <option value="il">📐 Illustrator Studio</option>
                    <option value="cr">✒️ CorelDraw Workspace</option>
                    <option value="an">👾 Adobe Animation Suite</option>
                    <option value="fg">❖ Figma Interface Labs</option>
                    <option value="story">🚀 Digital Storytelling Hub</option>
                </select>
            </div>
            <div class="track-list" id="active-track-list"></div>
        </div>
    </div>

    <div class="toast" id="admin-toast">Sequence Synchronized!</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm4p0_fYVSiwZmeco64CFw-twu1vTnM8o",
            authDomain: "my-portfolio-9d84e.firebaseapp.com",
            databaseURL: "https://my-portfolio-9d84e-default-rtdb.firebaseio.com",
            projectId: "my-portfolio-9d84e",
            storageBucket: "my-portfolio-9d84e.firebasestorage.app",
            messagingSenderId: "943404846120",
            appId: "1:943404846120:web:d3598c64ae653b2dd5391d",
            measurementId: "G-988VEX6FLM"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.addEventListener("DOMContentLoaded", () => {
            fetchCurrentSequence();
        });

        function triggerToast(message) {
            const toast = document.getElementById('admin-toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2500);
        }

        function saveProjectSequence() {
            const track = document.getElementById('track-select').value;
            const name = document.getElementById('project-name').value.trim();
            const url = document.getElementById('media-link').value.trim();

            if(!name || !url) {
                alert("Bhai name aur link dono fill karo tabhi pipeline aage chalegi!");
                return;
            }

            const timestamp = Date.now();
            database.ref(`portfolio/${track}/${timestamp}`).set({
                name: name,
                url: url
            }).then(() => {
                triggerToast("Workspace Update successful!");
                document.getElementById('project-name').value = "";
                document.getElementById('media-link').value = "";
                fetchCurrentSequence();
            }).catch(err => {
                alert("Database integration error: " + err.message);
            });
        }

        function fetchCurrentSequence() {
            const filterValue = document.getElementById('filter-select').value;
            const activeList = document.getElementById('active-track-list');
            activeList.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:20px;">Fetching from production database...</div>`;

            database.ref(`portfolio/${filterValue}`).on('value', snapshot => {
                activeList.innerHTML = "";
                const data = snapshot.val();
                let count = 0;

                if(data) {
                    Object.keys(data).forEach(key => {
                        count++;
                        const item = data[key];
                        const row = `
                            <div class="track-item">
                                <div class="track-info">
                                    <span class="track-title">${item.name}</span>
                                    <span class="track-meta">${item.url.substring(0, 50)}...</span>
                                </div>
                                <button class="delete-btn" onclick="deleteSequenceSlot('${filterValue}', '${key}')">Remove</button>
                            </div>
                        `;
                        activeList.insertAdjacentHTML('beforeend', row);
                    });
                }

                if(count === 0) {
                    activeList.innerHTML = `<div style="text-align:center;color:var(--text-muted);padding:20px;">Timeline list is currently empty.</div>`;
                }
            });
        }

        function deleteSequenceSlot(track, id) {
            if(confirm("Kya aap sach mein is asset ko timeline se delete karna chahte ho?")) {
                database.ref(`portfolio/${track}/${id}`).remove().then(() => {
                    triggerToast("Asset removed from sequence.");
                    fetchCurrentSequence();
                });
            }
        }
    </script>
</body>
</html>
