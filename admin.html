<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG | Control Panel (Link System)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #050608;
            --card-bg: linear-gradient(145deg, #0f131a, #0b0c10);
            --text-main: #ffffff;
            --text-sub: #aeb6bf;
            --neon-accent: #ff4a4a;
            --border-color: rgba(255, 255, 255, 0.05);
            --track-bg: #0f1219;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-sub); padding: 40px 5%; }
        h1 { font-family: 'Syne', sans-serif; color: var(--text-main); font-size: 36px; margin-bottom: 10px; text-align: center; }
        .subtitle { text-align: center; color: var(--neon-accent); letter-spacing: 2px; text-transform: uppercase; font-size: 12px; margin-bottom: 40px; }
        
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1300px; margin: 0 auto; }
        .category-admin-box { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 30px; display: flex; flex-direction: column; }
        .category-admin-box h2 { font-family: 'Syne', sans-serif; color: var(--text-main); margin-bottom: 20px; font-size: 22px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        .track-slot { background: var(--track-bg); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .input-field { width: 100%; background: #07090d; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; color: #fff; font-size: 13px; margin-top: 8px; outline: none; }
        .input-field:focus { border-color: var(--neon-accent); }
        
        .save-btn { background: #45f3ff; color: #050608; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 13px; width: 100%; transition: 0.3s; }
        .save-btn:hover { background: #ffffff; box-shadow: 0 0 15px rgba(69, 243, 255, 0.4); }
        
        .preview-media { width: 100%; max-height: 150px; object-fit: contain; border-radius: 8px; margin-top: 15px; display: block; background: #000; }
        .delete-btn { background: #2c1212; color: #ff6b6b; border: 1px solid #5a1818; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; margin-top: 12px; display: inline-block; }
        
        .add-track-trigger { background: transparent; color: var(--text-main); border: 1px dashed var(--neon-accent); padding: 15px; border-radius: 16px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <h1>MG Creator Hub</h1>
    <div class="subtitle">Instant URL/Link Update Management</div>

    <div class="admin-grid">
        <div class="category-admin-box">
            <h2>🎬 Video Editing Track</h2>
            <div id="edit-slots-container"></div>
            <button class="add-track-trigger" onclick="addNewSlot('edit')">+ Add New Track</button>
        </div>

        <div class="category-admin-box">
            <h2>🚀 Digital Storytelling Track</h2>
            <div id="story-slots-container"></div>
            <button class="add-track-trigger" onclick="addNewSlot('story')">+ Add New Track</button>
        </div>

        <div class="category-admin-box">
            <h2>🎭 Acting & Direction Track</h2>
            <div id="act-slots-container"></div>
            <button class="add-track-trigger" onclick="addNewSlot('act')">+ Add New Track</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCm4p0_fYVSiwZmeco64CFw-twu1vTnM8o",
            authDomain: "my-portfolio-9d84e.firebaseapp.com",
            databaseURL: "https://my-portfolio-9d84e-default-rtdb.firebaseio.com",
            projectId: "my-portfolio-9d84e",
            storageBucket: "my-portfolio-9d84e.firebasestorage.app",
            messagingSenderId: "943404846120",
            appId: "1:943404846120:web:d3598c64ae653b2dd5391d",
            measurementId: "G-988VEX6FLM"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const categories = ['edit', 'story', 'act'];

        document.addEventListener("DOMContentLoaded", () => {
            loadSlots();
        });

        function loadSlots() {
            categories.forEach(cat => {
                database.ref(`portfolio/${cat}`).on('value', snapshot => {
                    const container = document.getElementById(`${cat}-slots-container`);
                    container.innerHTML = "";
                    const data = snapshot.val() || {};
                    
                    Object.keys(data).sort().forEach(slotId => {
                        renderSlot(cat, slotId, data[slotId], container);
                    });
                });
            });
        }

        function renderSlot(cat, slotId, data, container) {
            const slotNum = slotId.split('_')[1];
            const urlVal = data.url || '';
            const nameVal = data.name || '';

            const html = `
                <div class="track-slot">
                    <div style="font-size:13px; font-weight:bold; color:#fff; margin-bottom:5px;">Position #${slotNum}</div>
                    
                    <label style="font-size:11px; color:var(--text-sub);">Project Title:</label>
                    <input type="text" id="name-${cat}-${slotId}" class="input-field" placeholder="E.g., Funny Short Video" value="${nameVal}">
                    
                    <label style="font-size:11px; color:var(--text-sub); margin-top:10px; display:block;">Video/Image URL:</label>
                    <input type="text" id="url-${cat}-${slotId}" class="input-field" placeholder="Paste Instagram, YouTube, or Drive Link" value="${urlVal}">
                    
                    <button class="save-btn" onclick="saveSlotLink('${cat}', '${slotId}')">Save Data</button>

                    ${urlVal ? `<div style="margin-top:10px; font-size:11px; color:#45f3ff;">✔ Currently Linked & Live</div>` : ''}
                    
                    <button class="delete-btn" onclick="deleteSlot('${cat}', '${slotId}')">Delete Slot</button>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addNewSlot(cat) {
            database.ref(`portfolio/${cat}`).once('value', snapshot => {
                const data = snapshot.val() || {};
                const numbers = Object.keys(data).map(k => parseInt(k.split('_')[1])).filter(n => !isNaN(n));
                const nextNum = numbers.length > 0 ? Math.max(...numbers) + 1 : 1;
                
                database.ref(`portfolio/${cat}/slot_${nextNum}`).set({ name: '', url: '', placeholder: true });
            });
        }

        function saveSlotLink(cat, slotId) {
            const nameInput = document.getElementById(`name-${cat}-${slotId}`).value;
            const urlInput = document.getElementById(`url-${cat}-${slotId}`).value;

            if(!urlInput) {
                alert("Please paste a link first!");
                return;
            }

            database.ref(`portfolio/${cat}/${slotId}`).set({
                name: nameInput || "Untitled Work",
                url: urlInput
            }).then(() => {
                alert("Data saved successfully!");
            }).catch(err => {
                alert("Error: " + err.message);
            });
        }

        function deleteSlot(cat, slotId) {
            if (confirm("Kya aap is slot ko delete karna chahte hain?")) {
                database.ref(`portfolio/${cat}/${slotId}`).remove();
            }
        }
    </script>
</body>
</html>
